name: CI-CD

on:
  push:
    branches: [main, dev]
    paths:
      - web/**
  pull_request:
    branches: [main, dev]
    paths:
      - web/**

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: html-gitops-eks

jobs:
  BuildAndPublish:
    name: "Build docker image"
    runs-on: ubuntu-latest
    steps:
      - name: Code Checkout
        uses: actions/checkout@v4
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      - name: Build and Push Image
        id: ecr-publish
        run: |
          IMAGE=${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.run_number }}
          docker build -t $IMAGE -f ./web/Dockerfile ./web
          docker push $IMAGE
  DeployToK8S:
    needs: BuildAndPublish
    runs-on: ubuntu-latest
    steps:
      - name: Code Checkout
        uses: actions/checkout@v4
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG_DATA }}" > $HOME/.kube/config
          cat $HOME/.kube/config

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Test Kubectl
        run: kubectl get node

      - name: Login to ECR
        run: |
          kubectl create secret docker-registry regcred \
            --docker-server=${{ secrets.REGISTRY }} \
            --docker-username=AWS \
            --docker-password=$(aws ecr get-login-password --region ${{ env.AWS_REGION }}) \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Deploy DEV
        if: github.ref == 'refs/heads/dev'
        run: |
          IMAGE_REPO=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPOSITORY }}
          IMAGE_TAG=${{ github.run_number }}

          helm upgrade --install web-dev ./helm/dev-chart \
            --namespace dev \
            --create-namespace \
            --set image.repository=$IMAGE_REPO \
            --set image.tag=$IMAGE_TAG

      - name: Deploy STAGE
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          IMAGE_REPO=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPOSITORY }}
          IMAGE_TAG=${{ github.run_number }}

          helm upgrade --install web-stage ./helm/stage-chart \
            --namespace stage \
            --create-namespace \
            --set image.repository=$IMAGE_REPO \
            --set image.tag=$IMAGE_TAG
